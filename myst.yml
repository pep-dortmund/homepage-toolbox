# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  title: PeP et al. Toolbox Workshop
  license:
    code: MIT
    content: CC-BY-4.0
  toc:
    # Auto-generated by `myst init --write-toc`
    - file: index.md
    - file: notes.md
      title: Material
    - file: problem.md
      title: Hilfe
    - file: about.md
    - file: archive.md
    - file: links.md

  plugins:
    - https://github.com/jupyter-book/myst-plugins/releases/download/footer-latest/index.mjs

site:
  projects:
    - slug: main
      path: .
    - slug: install
      path: install
    - slug: introduction
      path: introduction
    - slug: current
      path: files/archive/current

  nav:
    - title: Installation
      url: /install
    - title: Einstieg
      url: /introduction
    - title: Material
      url: /main/notes
    - title: Hilfe
      url: /main/problem
    - title: Mehr
      children:
        - title: Über
          url: /main/about
        - title: Archiv
          url: /main/archive
        - title: Links
          url: /main/links

  options:
    favicon: _static/pep_neg.svg
    logo: _static/pep_neg.svg
    logo_text: Toolbox Workshop

  parts:
    banner: _parts/banner.md
    footer: _parts/footer.md
